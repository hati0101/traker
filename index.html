<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOOP 추적기</title>
<style>
  :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --accent: #7fdbca; --danger: #e94560; --warn: #f5a623; --text: #eee; --dim: #888; --found: #4eff4e; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: '맑은 고딕', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 960px; margin: 0 auto; padding: 16px; }

  /* 비밀번호 */
  #lockScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .lock-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 32px 40px; text-align: center; min-width: 320px; }
  .lock-box h2 { color: var(--accent); margin-bottom: 20px; }
  .lock-box input { padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: #0f1a30; color: var(--text); font-size: 18px; text-align: center; width: 180px; letter-spacing: 4px; }
  .lock-box button { display: block; margin: 16px auto 0; padding: 10px 32px; background: var(--accent); color: #111; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; }
  .lock-box .error { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 20px; }

  /* 탭 */
  .tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
  .tab { padding: 10px 24px; cursor: pointer; color: var(--dim); font-size: 15px; font-weight: bold; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* 공통 */
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 10px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
  .row:last-child { margin-bottom: 0; }
  label { font-size: 13px; color: var(--dim); white-space: nowrap; }
  input[type="number"], input[type="text"] { padding: 7px 10px; border: 1px solid var(--border); border-radius: 4px; background: #0f1a30; color: var(--text); font-size: 14px; }
  input[type="number"] { width: 65px; }
  input[type="text"] { width: 200px; }
  input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }
  .btn { padding: 7px 16px; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-scan { background: var(--accent); color: #111; }
  .btn-stop { background: var(--danger); color: #fff; }
  .progress-wrap { height: 24px; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; width: 0%; }
  .progress-text { font-size: 12px; color: var(--dim); min-width: 80px; text-align: right; }

  /* 결과 카드 */
  .results-header { font-size: 15px; font-weight: bold; margin-bottom: 6px; color: var(--found); }
  .result-card { background: #122a1a; border: 1px solid #1e4a2e; border-radius: 8px; padding: 10px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; } }
  .result-card .rc-nick { font-size: 15px; font-weight: bold; color: var(--found); min-width: 100px; }
  .result-card .rc-id { font-size: 12px; color: var(--dim); min-width: 90px; }
  .result-card .rc-title { font-size: 13px; color: var(--text); flex: 1; }
  .result-card .rc-time { font-size: 11px; color: var(--dim); }
  .no-result { text-align: center; padding: 24px; color: var(--dim); font-size: 14px; }

  /* 팬 리스트 */
  .fan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-bottom: 12px; }
  .fan-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .fan-card img { width: 28px; height: 28px; border-radius: 50%; }
  .fan-card .fan-nick { font-weight: bold; }
  .fan-card .fan-status { font-size: 11px; margin-left: auto; }
  .fan-card.found { border-color: var(--found); background: #122a1a; }
  .fan-card.searching { border-color: var(--warn); }
  .fan-card.notfound { opacity: 0.5; }
  .fan-card a { color: inherit; text-decoration: none; display: flex; align-items: center; gap: 8px; flex: 1; }
  .fan-card a:hover .fan-nick { text-decoration: underline; }

  /* 스트리머 정보 */
  .bj-info { background: var(--card); border: 1px solid var(--accent); border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; }
  .bj-info img { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--accent); }
  .bj-info .bj-detail { flex: 1; }
  .bj-info .bj-detail .name { font-size: 18px; font-weight: bold; color: var(--accent); }
  .bj-info .bj-detail .id { font-size: 12px; color: var(--dim); }
  .bj-info a { color: var(--accent); font-size: 13px; text-decoration: none; border: 1px solid var(--accent); padding: 5px 12px; border-radius: 5px; }
  .bj-info a:hover { background: var(--accent); color: #111; }

  /* 로그 */
  .log-header { font-size: 14px; font-weight: bold; margin: 10px 0 6px; color: var(--accent); display: flex; justify-content: space-between; }
  .log-header button { font-size: 11px; padding: 2px 8px; background: var(--border); border: none; color: var(--dim); border-radius: 3px; cursor: pointer; }
  .log-box { background: #0a0a12; border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-family: Consolas, monospace; font-size: 11px; height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
  .log-ok { color: #4eff4e; } .log-warn { color: #f5a623; } .log-err { color: #e94560; } .log-data { color: #a8d8ea; }
</style>
</head>
<body>

<!-- 비밀번호 -->
<div id="lockScreen">
  <div class="lock-box">
    <h2>🔒 SOOP 추적기</h2>
    <input type="password" id="pwInput" placeholder="비밀번호" maxlength="10" autocomplete="off">
    <button onclick="checkPw()">입장</button>
    <div class="error" id="pwError"></div>
  </div>
</div>

<div class="container" id="mainApp" style="display:none">

  <!-- 탭 헤더 -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)">🔍 시청자 추적기</div>
    <div class="tab" onclick="switchTab(1)">👥 열혈팬 추적기</div>
  </div>

  <!-- ═══ 탭1: 시청자 추적기 ═══ -->
  <div class="tab-content active" id="tab0">
    <div class="panel">
      <div class="row">
        <label>시청자 아이디:</label>
        <input type="text" id="t0_targetId" placeholder="검색할 아이디">
        <button class="btn btn-scan" id="t0_btnScan" onclick="t0_start()">🔍 검색</button>
        <button class="btn btn-stop" id="t0_btnStop" onclick="t0_stop()" disabled>⏹ 중지</button>
      </div>
      <div class="row">
        <input type="checkbox" id="t0_chkVirtual" checked><label for="t0_chkVirtual">버추얼 필터</label>
        <span style="margin-left:12px"></span>
        <label>시청자 수:</label>
        <input type="number" id="t0_vMin" value="0" min="0" style="width:60px">
        <label>~</label>
        <input type="number" id="t0_vMax" value="0" min="0" style="width:60px">
        <label style="font-size:11px;color:var(--dim)">(0=무제한)</label>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="t0_pFill"></div></div>
      <span class="progress-text" id="t0_pText">대기 중</span>
    </div>
    <div class="results-header">✅ 발견: <span id="t0_count">0</span>건</div>
    <div id="t0_results"><div class="no-result">검색 결과가 여기에 표시됩니다.</div></div>
    <div class="log-header"><span>로그</span><button onclick="$('t0_log').innerHTML=''">클리어</button></div>
    <div class="log-box" id="t0_log"></div>
  </div>

  <!-- ═══ 탭2: 열혈팬 추적기 ═══ -->
  <div class="tab-content" id="tab1">
    <div class="panel">
      <div class="row">
        <label>스트리머 아이디:</label>
        <input type="text" id="t1_bjId" placeholder="열혈팬 조회할 BJ">
        <button class="btn btn-scan" id="t1_btnScan" onclick="t1_start()">👥 검색</button>
        <button class="btn btn-stop" id="t1_btnStop" onclick="t1_stop()" disabled>⏹ 중지</button>
      </div>
      <div class="row">
        <input type="checkbox" id="t1_chkVirtual" checked><label for="t1_chkVirtual">버추얼 필터</label>
        <span style="margin-left:12px"></span>
        <label>시청자 수:</label>
        <input type="number" id="t1_vMin" value="0" min="0" style="width:60px">
        <label>~</label>
        <input type="number" id="t1_vMax" value="0" min="0" style="width:60px">
        <label style="font-size:11px;color:var(--dim)">(0=무제한)</label>
      </div>
    </div>
    <div id="t1_bjInfo" style="display:none"></div>
    <div id="t1_fanGrid" class="fan-grid" style="display:none"></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="t1_pFill"></div></div>
      <span class="progress-text" id="t1_pText">대기 중</span>
    </div>
    <div class="results-header">✅ 발견: <span id="t1_count">0</span>건</div>
    <div id="t1_results"><div class="no-result">스트리머 아이디를 입력하면 열혈팬 20명이 어디서 방송을 보는지 추적합니다.</div></div>
    <div class="log-header"><span>로그</span><button onclick="$('t1_log').innerHTML=''">클리어</button></div>
    <div class="log-box" id="t1_log"></div>
  </div>

</div>

<script>
// ═══ 유틸 ═══
const STARTER = "\x1b\t", SEP = "\x0c";
const V_CATE = "00810000";
const V_KW = ["버추얼", "버츄얼", "vtuber", "vtube", "virtual"];
const SUFFIX_RE = /\(\d+\)$/;
const $ = id => document.getElementById(id);
const cleanId = raw => raw.replace(SUFFIX_RE, '').trim();
const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
const now = () => new Date().toLocaleTimeString('ko', { hour12: false });

function buildPacket(type, payload) {
  const len = new TextEncoder().encode(payload).length;
  return `${STARTER}${type}${String(len).padStart(6, '0')}00${payload}`;
}

function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === idx));
}

class Semaphore {
  constructor(max) { this.max = max; this.cur = 0; this.queue = []; }
  acquire() { return new Promise(r => { if (this.cur < this.max) { this.cur++; r(); } else this.queue.push(r); }); }
  release() { this.cur--; if (this.queue.length) { this.cur++; this.queue.shift()(); } }
}

// ═══ API ═══
async function apiBroadcasts(page, signal) {
  const r = await fetch(`/api/broadcasts?page=${page}`, { signal });
  const d = await r.json();
  return d.broad || [];
}
async function apiDetail(bjId, signal) {
  const r = await fetch(`/api/detail?bjid=${bjId}`, { signal });
  const d = await r.json();
  return d.CHANNEL || null;
}
async function apiTopFans(bjId) {
  const r = await fetch(`/api/topfans?bjid=${bjId}`);
  return r.json();
}

// ═══ 방송 목록 + 필터 (공용) ═══
async function getBroadcasts(useVirtual, vMin, vMax, logFn, signal) {
  logFn('방송 목록 수집 중...');
  let all = [];
  for (let p = 1; p <= 100; p++) {
    if (signal.aborted) break;
    try {
      const b = await apiBroadcasts(p, signal);
      if (!b.length) break;
      all.push(...b);
      if (p % 10 === 0) logFn(`  ${p}페이지 (${all.length}개)`);
    } catch { if (signal.aborted) break; }
  }
  logFn(`총 ${all.length}개 수집`, 'log-ok');

  if (useVirtual) {
    all = all.filter(b => b.broad_cate_no === V_CATE || (b.hash_tags || []).some(t => V_KW.some(k => t.toLowerCase().includes(k))));
    logFn(`버추얼 필터 → ${all.length}개`);
  }
  if (vMin > 0 || vMax > 0) {
    all = all.filter(b => { const c = parseInt(b.total_view_cnt) || 0; return (vMin <= 0 || c >= vMin) && (vMax <= 0 || c <= vMax); });
    logFn(`시청자 필터(${vMin}~${vMax > 0 ? vMax : '∞'}) → ${all.length}개`);
  }
  return all;
}

// ═══ WebSocket: 특정 유저 찾기 ═══
function scanForViewer(channel, targetId, timeoutMs = 10000) {
  return new Promise(resolve => {
    const url = `wss://${channel.CHDOMAIN.toLowerCase()}:${parseInt(channel.CHPT)+1}/Websocket/${channel.BJID}`;
    let ws, timer, vTimer, resolved = false, found = false;
    const done = (f) => { if (resolved) return; resolved = true; found = f || false; clearTimeout(timer); clearTimeout(vTimer); try { ws.close(); } catch {} resolve(found); };
    const rvt = () => { clearTimeout(vTimer); vTimer = setTimeout(() => done(false), 2000); };

    try { ws = new WebSocket(url, 'chat'); } catch { resolve(false); return; }
    timer = setTimeout(() => done(false), timeoutMs);
    ws.onopen = () => ws.send(buildPacket('0001', `${SEP}${SEP}${SEP}16${SEP}`));
    ws.onerror = () => done(false);
    ws.onclose = () => done(false);
    ws.onmessage = evt => {
      if (resolved) return;
      const handler = p => {
        const si = p.indexOf(STARTER); if (si < 0) return;
        const pk = p.substring(si); if (pk.length < 6) return;
        const t = pk.substring(2, 6);
        if (t === '0001') ws.send(buildPacket('0002', `${SEP}${channel.CHATNO}${SEP.repeat(5)}`));
        else if (t === '0127') {
          const parts = pk.substring(14).split(SEP);
          for (let i = 1; i < parts.length - 1; i += 2) {
            if (cleanId(parts[i].trim()).toLowerCase() === targetId.toLowerCase()) { done(true); return; }
          }
          rvt();
        } else if (t === '0007') done(false);
      };
      if (evt.data instanceof Blob) { const r = new FileReader(); r.onload = () => handler(r.result); r.readAsText(evt.data); }
      else handler(typeof evt.data === 'string' ? evt.data : new TextDecoder().decode(evt.data));
    };
  });
}

// ═══ WebSocket: 여러 유저 동시 찾기 (열혈팬용) ═══
function scanForMultiple(channel, targetIds, timeoutMs = 12000) {
  return new Promise(resolve => {
    const url = `wss://${channel.CHDOMAIN.toLowerCase()}:${parseInt(channel.CHPT)+1}/Websocket/${channel.BJID}`;
    const targetSet = new Set(targetIds.map(id => id.toLowerCase()));
    const foundIds = new Set();
    let ws, timer, vTimer, resolved = false;

    const done = () => { if (resolved) return; resolved = true; clearTimeout(timer); clearTimeout(vTimer); try { ws.close(); } catch {} resolve([...foundIds]); };
    const rvt = () => { clearTimeout(vTimer); vTimer = setTimeout(done, 2000); };

    try { ws = new WebSocket(url, 'chat'); } catch { resolve([]); return; }
    timer = setTimeout(done, timeoutMs);
    ws.onopen = () => ws.send(buildPacket('0001', `${SEP}${SEP}${SEP}16${SEP}`));
    ws.onerror = done;
    ws.onclose = done;
    ws.onmessage = evt => {
      if (resolved) return;
      const handler = p => {
        const si = p.indexOf(STARTER); if (si < 0) return;
        const pk = p.substring(si); if (pk.length < 6) return;
        const t = pk.substring(2, 6);
        if (t === '0001') ws.send(buildPacket('0002', `${SEP}${channel.CHATNO}${SEP.repeat(5)}`));
        else if (t === '0127') {
          const parts = pk.substring(14).split(SEP);
          for (let i = 1; i < parts.length - 1; i += 2) {
            const cid = cleanId(parts[i].trim()).toLowerCase();
            if (targetSet.has(cid)) foundIds.add(cid);
          }
          rvt();
        } else if (t === '0007') done();
      };
      if (evt.data instanceof Blob) { const r = new FileReader(); r.onload = () => handler(r.result); r.readAsText(evt.data); }
      else handler(typeof evt.data === 'string' ? evt.data : new TextDecoder().decode(evt.data));
    };
  });
}

// ══════════════════════════════════════
//  탭1: 시청자 추적기
// ══════════════════════════════════════
let t0_abort = null;
function t0_log(m, c = '') { $('t0_log').innerHTML += `<span class="${c}">[${now()}] ${m}</span>\n`; $('t0_log').scrollTop = 9e9; }

async function t0_start() {
  const tid = $('t0_targetId').value.trim();
  if (!tid) { alert('시청자 아이디를 입력하세요.'); return; }

  $('t0_btnScan').disabled = true; $('t0_btnStop').disabled = false;
  $('t0_results').innerHTML = ''; $('t0_count').textContent = '0'; $('t0_log').innerHTML = '';
  $('t0_pFill').style.width = '0%'; $('t0_pText').textContent = '시작 중...';
  t0_abort = new AbortController();
  const signal = t0_abort.signal;

  try {
    t0_log(`=== [${tid}] 검색 시작 ===`, 'log-ok');
    const broads = await getBroadcasts($('t0_chkVirtual').checked, +$('t0_vMin').value, +$('t0_vMax').value, t0_log, signal);
    if (!broads.length) { t0_log('대상 방송 없음', 'log-warn'); return; }

    t0_log(`${broads.length}개 방송 스캔 시작`);
    const total = broads.length; let done = 0, found = 0;
    const sem = new Semaphore(200);

    await Promise.all(broads.map(async b => {
      if (signal.aborted) return;
      await sem.acquire();
      if (signal.aborted) { sem.release(); return; }
      try {
        const ch = await apiDetail(b.user_id, signal);
        if (!ch || ch.RESULT !== 1 || !ch.CHDOMAIN) return;
        t0_log(`  스캔: ${ch.BJNICK || b.user_id}`, 'log-data');
        if (await scanForViewer(ch, tid)) {
          found++;
          t0_log(`  ✅ 발견! ${ch.BJNICK}(${ch.BJID})`, 'log-ok');
          const el = $('t0_results');
          el.innerHTML += `<div class="result-card"><span class="rc-nick">${esc(ch.BJNICK)}</span><span class="rc-id">${esc(ch.BJID)}</span><span class="rc-title">${esc(ch.TITLE)}</span><span class="rc-time">${now()}</span></div>`;
          $('t0_count').textContent = found;
        }
      } catch {} finally { done++; $('t0_pFill').style.width = (done/total*100)+'%'; $('t0_pText').textContent = `${done}/${total}`; sem.release(); }
    }));

    t0_log(signal.aborted ? '🛑 중지됨' : `=== 완료: ${found}개 발견 ===`, signal.aborted ? 'log-warn' : 'log-ok');
    if (!found && !signal.aborted) $('t0_results').innerHTML = `<div class="no-result">${total}개 방송에서 [${esc(tid)}]를 찾지 못했습니다.</div>`;
  } catch {} finally { $('t0_btnScan').disabled = false; $('t0_btnStop').disabled = true; }
}
function t0_stop() { t0_abort?.abort(); t0_log('중지 요청...', 'log-warn'); }

// ══════════════════════════════════════
//  탭2: 열혈팬 추적기
// ══════════════════════════════════════
let t1_abort = null;
function t1_log(m, c = '') { $('t1_log').innerHTML += `<span class="${c}">[${now()}] ${m}</span>\n`; $('t1_log').scrollTop = 9e9; }

async function t1_start() {
  const bjId = $('t1_bjId').value.trim();
  if (!bjId) { alert('스트리머 아이디를 입력하세요.'); return; }

  $('t1_btnScan').disabled = true; $('t1_btnStop').disabled = false;
  $('t1_results').innerHTML = ''; $('t1_count').textContent = '0'; $('t1_log').innerHTML = '';
  $('t1_pFill').style.width = '0%'; $('t1_pText').textContent = '시작 중...';
  t1_abort = new AbortController();
  const signal = t1_abort.signal;

  try {
    // 1) 열혈팬 목록
    t1_log(`=== [${bjId}] 열혈팬 조회 ===`, 'log-ok');
    const fans = await apiTopFans(bjId);
    if (!fans || !fans.length) { t1_log('열혈팬 목록이 없습니다.', 'log-warn'); return; }
    t1_log(`열혈팬 ${fans.length}명 획득`, 'log-ok');

    // 스트리머 정보 표시
    const bjInfo = $('t1_bjInfo');
    const stationUrl = `https://ch.sooplive.co.kr/${bjId}`;
    const profileImg = `https://profile.img.sooplive.co.kr/LOGO/${bjId}/${bjId}.jpg`;
    // apiDetail로 닉네임 가져오기
    let bjNick = bjId;
    try {
      const ch = await apiDetail(bjId, signal);
      if (ch && ch.BJNICK) bjNick = ch.BJNICK;
    } catch {}
    bjInfo.style.display = 'block';
    bjInfo.innerHTML = `<div class="bj-info"><img src="${profileImg}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 48 48%22><rect fill=%22%231a1a2e%22 width=%2248%22 height=%2248%22/><text x=%2224%22 y=%2230%22 text-anchor=%22middle%22 fill=%22%237fdbca%22 font-size=%2220%22>👤</text></svg>'"><div class="bj-detail"><div class="name">${esc(bjNick)}</div><div class="id">${esc(bjId)}</div></div><a href="${stationUrl}" target="_blank">방송국 →</a></div>`;

    // 팬 카드 표시 (클릭 시 방송국 이동)
    const grid = $('t1_fanGrid'); grid.style.display = 'grid'; grid.innerHTML = '';
    const fanMap = {};
    fans.forEach((f, i) => {
      fanMap[f.userId.toLowerCase()] = { ...f, idx: i, found: false, count: 0 };
      const fanStation = `https://ch.sooplive.co.kr/${f.userId}`;
      grid.innerHTML += `<div class="fan-card searching" id="fc_${i}"><a href="${fanStation}" target="_blank"><img src="${f.profileImage}" onerror="this.style.display='none'"><span class="fan-nick">${esc(f.userNick)}</span></a><span class="fan-status" id="fs_${i}">🔍</span></div>`;
    });

    const fanIds = fans.map(f => f.userId);

    // 2) 방송 목록
    const broads = await getBroadcasts($('t1_chkVirtual').checked, +$('t1_vMin').value, +$('t1_vMax').value, t1_log, signal);
    if (!broads.length) { t1_log('대상 방송 없음', 'log-warn'); return; }

    // 3) 방송별 스캔 — 한 방송에서 20명 동시 체크
    t1_log(`${broads.length}개 방송에서 ${fanIds.length}명 추적 시작`);
    const total = broads.length; let done = 0, totalFound = 0;
    const sem = new Semaphore(200);

    await Promise.all(broads.map(async b => {
      if (signal.aborted) return;
      await sem.acquire();
      if (signal.aborted) { sem.release(); return; }

      try {
        const ch = await apiDetail(b.user_id, signal);
        if (!ch || ch.RESULT !== 1 || !ch.CHDOMAIN) return;

        const foundInThis = await scanForMultiple(ch, fanIds, 12000);

        foundInThis.forEach(fid => {
          const fan = fanMap[fid];
          if (!fan) return;
          fan.found = true;
          fan.count = (fan.count || 0) + 1;
          totalFound++;
          $('t1_count').textContent = totalFound;

          const card = $(`fc_${fan.idx}`);
          if (card) card.className = 'fan-card found';
          const status = $(`fs_${fan.idx}`);
          if (status) status.innerHTML = `✅ ${fan.count}개 방송`;

          $('t1_results').innerHTML += `<div class="result-card"><span class="rc-nick">${esc(fan.userNick)}</span><span class="rc-id">${esc(fan.userId)}</span><span class="rc-title">→ ${esc(ch.BJNICK)} — ${esc(ch.TITLE)}</span><span class="rc-time">${now()}</span></div>`;

          t1_log(`  ✅ ${fan.userNick}(${fan.userId}) → ${ch.BJNICK}(${ch.BJID})`, 'log-ok');
        });

        if (foundInThis.length === 0) {
          // 로그 안 찍음 (너무 많으니)
        }
      } catch {} finally {
        done++;
        $('t1_pFill').style.width = (done/total*100)+'%';
        $('t1_pText').textContent = `${done}/${total}`;
        sem.release();
      }
    }));

    // 미발견 팬 표시
    Object.values(fanMap).forEach(f => {
      if (!f.found) {
        const card = $(`fc_${f.idx}`);
        if (card) card.className = 'fan-card notfound';
        const status = $(`fs_${f.idx}`);
        if (status) status.textContent = '—';
      }
    });

    t1_log(signal.aborted ? '🛑 중지됨' : `=== 완료: ${totalFound}/${fans.length}명 발견 ===`, signal.aborted ? 'log-warn' : 'log-ok');
    if (!totalFound && !signal.aborted) $('t1_results').innerHTML = `<div class="no-result">${total}개 방송에서 열혈팬을 찾지 못했습니다.</div>`;
  } catch (e) { t1_log(`오류: ${e.message}`, 'log-err'); } finally { $('t1_btnScan').disabled = false; $('t1_btnStop').disabled = true; }
}
function t1_stop() { t1_abort?.abort(); t1_log('중지 요청...', 'log-warn'); }

// ═══ 비밀번호 ═══
async function checkPw() {
  const pw = $('pwInput').value.trim();
  if (!pw) { $('pwError').textContent = '비밀번호를 입력하세요.'; return; }
  try {
    const r = await fetch('/api/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: pw }) });
    const d = await r.json();
    if (d.ok) { $('lockScreen').style.display = 'none'; $('mainApp').style.display = 'block'; sessionStorage.setItem('authed', '1'); }
    else { $('pwError').textContent = d.message || '인증 실패'; $('pwInput').value = ''; $('pwInput').focus(); }
  } catch { $('pwError').textContent = '서버 연결 실패'; }
}
if (sessionStorage.getItem('authed') === '1') { $('lockScreen').style.display = 'none'; $('mainApp').style.display = 'block'; }
$('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });
$('pwInput').focus();
$('t0_targetId').addEventListener('keydown', e => { if (e.key === 'Enter') t0_start(); });
$('t1_bjId').addEventListener('keydown', e => { if (e.key === 'Enter') t1_start(); });
</script>
</body>
